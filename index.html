---
layout: page
permalink: /
---

<section class="featured-gallery" aria-label="置顶图片展示">
  <div class="featured-gallery-header">
    <h2>Overview</h2>
  </div>

  <div class="featured-gallery-track-wrap">
    <button class="gallery-nav gallery-nav-prev" type="button" aria-label="查看上一组图片">‹</button>

    <div class="featured-gallery-track" id="featured-gallery-track">
      <button class="featured-gallery-item" type="button" data-full="{{ '/assets/img/phd/PhD1.jpg' | relative_url }}">
        <img src="{{ '/assets/img/phd/PhD1.jpg' | relative_url }}" alt="精选图片 1" loading="lazy" />
      </button>
      <button class="featured-gallery-item" type="button" data-full="{{ '/assets/img/phd/PhD2.jpg' | relative_url }}">
        <img src="{{ 'assets/assets/strain engineering.PNG' | relative_url }}" alt="精选图片 2" loading="lazy" />
      </button>
      <button class="featured-gallery-item" type="button" data-full="{{ '/assets/img/phd/PhD3.jpg' | relative_url }}">
        <img src="{{ 'assets/assets/RuVO2.PNG' | relative_url }}" alt="精选图片 3" loading="lazy" />
      </button>
      <button class="featured-gallery-item" type="button" data-full="{{ '/assets/img/phd/PhD5.jpg' | relative_url }}">
        <img src="{{ '/assets/img/phd/PhD5.jpg' | relative_url }}" alt="精选图片 4" loading="lazy" />
      </button>
      <button class="featured-gallery-item" type="button" data-full="{{ '/assets/assets/LuHao.jpg' | relative_url }}">
        <img src="{{ 'assets/assets/smartwindows.png' | relative_url }}" alt="精选图片 5" loading="lazy" />
      </button>
      <button class="featured-gallery-item" type="button" data-full="{{ '/assets/assets/selfpic.jpg' | relative_url }}">
        <img src="{{ 'assets/assets/Raman.PNG' | relative_url }}" alt="精选图片 6" loading="lazy" />
      </button>
    </div>

    <button class="gallery-nav gallery-nav-next" type="button" aria-label="查看下一组图片">›</button>
  </div>
</section>

<div class="gallery-lightbox" id="gallery-lightbox" hidden>
  <button class="lightbox-close" id="lightbox-close" type="button" aria-label="关闭放大图">×</button>
  <img id="lightbox-image" src="" alt="放大查看" />
</div>

<div class="post-title-list">
  {% for post in site.posts %}
    <article class="post-title-item">
      <h2>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </h2>
      <p class="post-meta">{{ post.date | date: "%b %-d, %Y" }}</p>
    </article>
  {% endfor %}
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const track = document.getElementById('featured-gallery-track');
    const prevBtn = document.querySelector('.gallery-nav-prev');
    const nextBtn = document.querySelector('.gallery-nav-next');
    const lightbox = document.getElementById('gallery-lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const closeBtn = document.getElementById('lightbox-close');

    if (track && prevBtn && nextBtn) {
      const scrollStep = () => Math.round(track.clientWidth * 0.75);

      prevBtn.addEventListener('click', function () {
        track.scrollBy({ left: -scrollStep(), behavior: 'smooth' });
      });

      nextBtn.addEventListener('click', function () {
        track.scrollBy({ left: scrollStep(), behavior: 'smooth' });
      });
    }

    document.querySelectorAll('.featured-gallery-item').forEach(function (item) {
      item.addEventListener('click', function () {
        const fullImage = item.dataset.full;
        if (!fullImage || !lightbox || !lightboxImage) return;

        lightboxImage.src = fullImage;
        lightbox.hidden = false;
        document.body.classList.add('lightbox-open');
      });
    });

    const closeLightbox = function () {
      if (!lightbox || !lightboxImage) return;
      lightbox.hidden = true;
      lightboxImage.src = '';
      document.body.classList.remove('lightbox-open');
    };

    closeBtn?.addEventListener('click', closeLightbox);
    lightbox?.addEventListener('click', function (event) {
      if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', function (event) {
      if (event.key === 'Escape') closeLightbox();
    });
  });
</script>
